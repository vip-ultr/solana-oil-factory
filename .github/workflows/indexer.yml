name: indexer

# Re-runs the refinery program indexer + wallet-tenure crawler
# every 10 minutes. Commits any changes to lib/indexer/*.json
# back to main; Vercel auto-deploys on push, so the bundled
# JSON read by every server component is always fresh within
# ~10 minutes.
#
# Why this and not a Vercel cron route: Vercel functions can't
# write to the deploy artifact's filesystem, and switching to
# a database would have meant a Supabase schema migration that
# we couldn't apply via the available Supabase MCP / REST
# surface. GH Actions is free for the runtime cost we need
# (≈30s per run on a public repo) and keeps the architecture
# entirely declarative + auditable in git history.

on:
  schedule:
    # Every 10 minutes. GH cron is best-effort with 1-2 min jitter.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why a manual run was triggered"
        required: false
        default: "manual refresh"

# Single in-flight run; cancel any earlier still-running indexer
# so we don't push conflicting commits.
concurrency:
  group: indexer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run indexer
        run: pnpm indexer
        env:
          # Public RPC works for the small refinery tx volume.
          # Override to a Helius / Triton key by setting the
          # repo secret SOLANA_RPC_URL.
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}
          NEXT_PUBLIC_REFINERY_PROGRAM_ID: 2tPLLPQeLLNL4UDBbeagSUAABJcB3fHGTJaLGEzrx3rE

      - name: Refresh wallet tenure
        run: pnpm wallet-tenure
        continue-on-error: true # never block the indexer commit
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}

      - name: Commit + push if changed
        run: |
          git config user.name "sof-indexer-bot"
          git config user.email "indexer@solanaoilfactory.local"
          if git diff --quiet -- lib/indexer/events.json lib/indexer/wallet-tenure.json; then
            echo "No new events; nothing to commit."
            exit 0
          fi
          git add lib/indexer/events.json lib/indexer/wallet-tenure.json
          # Compact commit message + count of new events for skim-readability.
          NEW=$(git diff --cached --shortstat | sed 's/.*changed,/changed,/')
          git commit -m "chore(indexer): refresh ($NEW)" \
            -m "Auto-generated by .github/workflows/indexer.yml"
          git push origin HEAD:main
